<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>YouTube Search & Player</title>

<style>
body{
    font-family:Arial,sans-serif;
    max-width:1000px;
    margin:auto;
    padding:20px;
}

#player{
    width:100%;
    height:500px;
    margin-top:20px;
}

.result{
    border:1px solid #ccc;
    padding:10px;
    margin:5px 0;
}

button{
    padding:8px 12px;
    margin:4px;
    cursor:pointer;
}

input{
    width:300px;
    padding:8px;
}
</style>
</head>
<body>

<h2>YouTube Search</h2>

<input id="searchBox" placeholder="Search YouTube">
<button onclick="searchVideos()">Search</button>

<div id="player"></div>

<h3>Results</h3>
<div id="results"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
const API_KEY = "AIzaSyB7x5zyGdt3_9JnaIWqQYrvNkcB6lef_xA";

let player;

// Called automatically by YouTube API
function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
        height: '500',
        width: '100%',
        videoId: '',
        playerVars: {
            autoplay: 0,
            rel: 0
        }
    });
}

async function searchVideos() {

    const query = document.getElementById("searchBox").value;

    const url =
        `https://www.googleapis.com/youtube/v3/search` +
        `?part=snippet&type=video&maxResults=20` +
        `&q=${encodeURIComponent(query)}` +
        `&key=${API_KEY}`;

    const response = await fetch(url);
    const data = await response.json();

    const results = document.getElementById("results");
    results.innerHTML = "";

    if (!data.items) {
        results.innerHTML = "<p>No results.</p>";
        return;
    }

    data.items.forEach(item => {

        const videoId = item.id.videoId;

        const div = document.createElement("div");
        div.className = "result";

        div.innerHTML = `
            <img src="${item.snippet.thumbnails.medium.url}">
            <h4>${item.snippet.title}</h4>
            <p>${item.snippet.channelTitle}</p>

            <button onclick="playVideo('${videoId}')">
                Play Here
            </button>

            <button onclick="window.open('https://www.youtube.com/watch?v=${videoId}','_blank')">
                Open Video
            </button>

            <button onclick="window.open('https://www.youtube.com/shorts/${videoId}','_blank')">
                Open Short
            </button>
        `;

        results.appendChild(div);
    });
}

function playVideo(videoId) {

    if (!player) {
        alert("Player not ready yet.");
        return;
    }

    player.loadVideoById(videoId);

    document.getElementById("player").scrollIntoView({
        behavior: "smooth"
    });
}
</script>

</body>
</html>
