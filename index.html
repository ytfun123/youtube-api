<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>YouTube Video & Shorts Player</title>

<style>
body{
    font-family:Arial,sans-serif;
    max-width:1000px;
    margin:auto;
    padding:20px;
}

input{
    width:300px;
    padding:8px;
}

button{
    padding:8px 12px;
    margin:2px;
    cursor:pointer;
}

.result{
    border:1px solid #ccc;
    padding:10px;
    margin:5px 0;
}

iframe{
    width:100%;
    height:500px;
    margin-top:20px;
}
</style>
</head>
<body>

<h2>YouTube Search</h2>

<input id="query" placeholder="Search videos">
<button onclick="searchVideos()">Search</button>

<div id="results"></div>

<h3>Player</h3>
<iframe
    id="player"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen>
</iframe>

<script>
const API_KEY = "AIzaSyB7x5zyGdt3_9JnaIWqQYrvNkcB6lef_xA";

async function searchVideos() {

    const q = document.getElementById("query").value;

    const url =
        `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=20&q=${encodeURIComponent(q)}&key=${API_KEY}`;

    const response = await fetch(url);
    const data = await response.json();

    const results = document.getElementById("results");
    results.innerHTML = "";

    if (!data.items) {
        results.innerHTML = "No results.";
        return;
    }

    data.items.forEach(item => {

        const videoId = item.id.videoId;

        const div = document.createElement("div");
        div.className = "result";

        div.innerHTML = `
            <b>${item.snippet.title}</b><br>
            ${item.snippet.channelTitle}<br><br>

            <button onclick="playVideo('${videoId}')">
                Play Here
            </button>

            <button onclick="openVideo('${videoId}')">
                Open Video
            </button>

            <button onclick="openShort('${videoId}')">
                Open Short
            </button>
        `;

        results.appendChild(div);
    });
}

function playVideo(videoId) {
    document.getElementById("player").src =
        `https://www.youtube.com/embed/${videoId}?autoplay=1`;
}

function openVideo(videoId) {
    window.open(
        `https://www.youtube.com/watch?v=${videoId}`,
        "_blank"
    );
}

function openShort(videoId) {
    window.open(
        `https://www.youtube.com/shorts/${videoId}`,
        "_blank"
    );
}
</script>

</body>
</html>
