<!DOCTYPE html>
<html>
<body>

<button onclick="playVideo()">Play Test Video</button>

<div id="player"></div>

<script>
function playVideo() {
    document.getElementById("player").innerHTML = `
        <iframe
            width="800"
            height="450"
            src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1"
            allow="autoplay; encrypted-media"
            allowfullscreen>
        </iframe>
    `;
}
</script>

</body>
</html>
